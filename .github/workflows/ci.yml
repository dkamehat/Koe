name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pure-logic tests need no GPU/model/mic — just these light deps.
      # numpy: interpreter.py/talk.py import it at module level (pure math).
      - run: pip install pytest requests numpy
      - name: Syntax-check all modules
        run: python -m compileall koe talk.py interpreter.py bench.py
      - name: Run unit tests
        run: python -m pytest -q
