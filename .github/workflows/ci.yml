name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pure-logic tests need no GPU/model/mic — just these two light deps.
      - run: pip install pytest requests
      - name: Syntax-check all modules
        run: python -m compileall koe
      - name: Run unit tests
        run: python -m pytest -q
